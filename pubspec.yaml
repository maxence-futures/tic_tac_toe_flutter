name: tic_tac_toe_flutter
description: "A Tic-Tac-Toe game built with Flutter using Clean Architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: any

  # State management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Navigation
  auto_route: ^11.1.0

  # Persistence
  shared_preferences: ^2.5.4
  dartz: ^0.10.1
  drift: ^2.31.0
  drift_flutter: ^0.2.8

  # UI
  flutter_animate: ^4.5.2

  # Serialization / immutability
  freezed_annotation: ^3.0.0
  json_annotation: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Test utilities
  shared_preferences_platform_interface: any
  fake_async: any

  # Code generation
  build_runner: ^2.4.0
  riverpod_generator: ^4.0.3
  auto_route_generator: ^10.4.0
  drift_dev: ^2.31.0
  freezed: ^3.0.0
  json_serializable: ^6.7.0
  mockito: ^5.6.3

flutter:
  uses-material-design: true
  generate: true
