# ──────────────────────────────────────────────────────────────────────────────
# SonarCloud — Tic Tac Toe Flutter
# Doc : https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/languages/dart
# ──────────────────────────────────────────────────────────────────────────────

# ── Identification ─────────────────────────────────────────────────────────────
# sonar.organization  → à renseigner avec ton org SonarCloud (ex: mon-pseudo)
# sonar.projectKey    → doit être unique dans ton org (ex: mon-pseudo_tic-tac-toe)
sonar.organization=maxence-futures
sonar.projectKey=maxence-futures_tic_tac_toe_flutter
sonar.projectName=Tic Tac Toe Flutter
sonar.projectVersion=1.0.0

sonar.host.url=https://sonarcloud.io

# ── Sources ────────────────────────────────────────────────────────────────────
sonar.sources=lib
sonar.tests=test
sonar.sourceEncoding=UTF-8

# ── Exclusions ─────────────────────────────────────────────────────────────────
# Fichiers générés par build_runner (Riverpod, Freezed, AutoRoute, Drift,
# JSON serializable) et par flutter gen-l10n — inutile de les analyser.
sonar.exclusions=\
  **/*.g.dart,\
  **/*.freezed.dart,\
  **/*.gr.dart,\
  lib/l10n/**,\
  lib/core/router/app_router.gr.dart

# ── Couverture de tests (LCOV) ─────────────────────────────────────────────────
# Généré par : flutter test --coverage
# Nettoyé par : scripts/coverage.sh (exclut les fichiers générés du rapport)
sonar.dart.lcov.reportPaths=coverage/lcov.info
